<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SiCepat Jinxpro — Login</title>
  <link rel="icon" href="New-AWB.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: #060b14;
      background-image:
        radial-gradient(ellipse at 50% 30%, rgba(6, 214, 232, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 80%, rgba(6, 214, 232, 0.03) 0%, transparent 50%);
      color: #e8ecf2;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .login-card {
      background: rgba(14, 22, 40, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(30, 45, 69, 0.6);
      border-radius: 16px;
      padding: 48px 40px;
      width: 420px;
      max-width: 90%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      animation: cardIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .login-logo {
      width: 64px;
      height: 64px;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 16px rgba(6, 214, 232, 0.4));
    }
    .login-title {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(135deg, #06d6e8, #4ef0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }
    .login-subtitle {
      font-size: 13px;
      color: #62788a;
      margin-bottom: 10px;
      letter-spacing: 0.3px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: #445566;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(30, 45, 69, 0.6);
    }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      height: 46px;
      background: #ffffff;
      color: #1a1d24;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .google-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }
    .google-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .google-btn svg { width: 20px; height: 20px; }

    .field-group {
      text-align: left;
      margin-bottom: 14px;
    }
    .field-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #8899aa;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .email-input {
      width: 100%;
      height: 46px;
      padding: 0 14px;
      background: rgba(17, 28, 45, 0.75);
      border: 1px solid rgba(35, 50, 72, 0.8);
      border-radius: 10px;
      color: #e8ecf2;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }
    .email-input:focus {
      border-color: #06d6e8;
      box-shadow: 0 0 0 3px rgba(6, 214, 232, 0.2);
    }
    .email-input::placeholder { color: #445566; }
    .email-input:disabled { opacity: 0.5; }

    .email-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      height: 46px;
      background: linear-gradient(135deg, #06d6e8, #00b8d4);
      color: #060b14;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(6, 214, 232, 0.2);
    }
    .email-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(6, 214, 232, 0.35);
    }
    .email-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .msg {
      margin-top: 14px;
      font-size: 12px;
      min-height: 20px;
      line-height: 1.5;
    }
    .msg-error { color: #ef4444; }
    .msg-success { color: #10b981; }
    .login-footer {
      margin-top: 32px;
      font-size: 10px;
      color: #334155;
    }
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(6, 11, 20, 0.3);
      border-top-color: #060b14;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    .spinner-white {
      border-color: rgba(255,255,255,0.3);
      border-top-color: #fff;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="login-card">
  <img class="login-logo" src="New-AWB.png" alt="SiCepat Jinxpro">
  <div class="login-title">SiCepat Jinxpro</div>
  <div class="login-subtitle">AWB Tracker — Web Edition</div>

  <button id="btnGoogle" class="google-btn" onclick="handleGoogleLogin()">
    <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    <span id="googleText">Sign in with Google</span>
  </button>

  <div class="divider">atau</div>

  <div class="field-group">
    <label>Email</label>
    <input type="email" id="emailInput" class="email-input" placeholder="nama@email.com" autocomplete="email">
  </div>

  <button id="emailBtn" class="email-btn" onclick="handleEmailLogin()">
    <span id="emailBtnText">📧 Kirim Link Login</span>
  </button>

  <div class="msg" id="msgEl"></div>
  <div class="login-footer">Powered by Jinxpro</div>
</div>

<script type="module">
import { initAuth, signInWithGoogle, sendEmailLink, isAllowed } from "./auth.js";

let ready = false;

initAuth().then((user) => {
  ready = true;
  if (user && isAllowed(user)) {
    window.location.href = "/";
  }
});

window.handleGoogleLogin = async () => {
  const btn = document.getElementById("btnGoogle");
  const text = document.getElementById("googleText");
  const msgEl = document.getElementById("msgEl");

  if (!ready) { msgEl.className = "msg msg-error"; msgEl.textContent = "⏳ Menghubungkan..."; return; }

  btn.disabled = true;
  text.innerHTML = '<span class="spinner spinner-white"></span>';
  msgEl.className = "msg";

  try {
    const user = await signInWithGoogle();
    if (!user) {
      msgEl.className = "msg msg-error";
      msgEl.textContent = "❌ Gagal sign in. Coba lagi.";
    } else if (!isAllowed(user)) {
      msgEl.className = "msg msg-error";
      msgEl.textContent = "❌ Akun " + user.email + " tidak diizinkan.";
    } else {
      window.location.href = "/";
    }
  } catch (err) {
    msgEl.className = "msg msg-error";
    msgEl.textContent = "❌ Error: " + (err.message || "Gagal");
  }
  btn.disabled = false;
  text.textContent = "Sign in with Google";
};

window.handleEmailLogin = async () => {
  const email = document.getElementById("emailInput").value.trim();
  const btn = document.getElementById("emailBtn");
  const btnText = document.getElementById("emailBtnText");
  const msgEl = document.getElementById("msgEl");

  if (!email || !email.includes("@")) {
    msgEl.className = "msg msg-error";
    msgEl.textContent = "❌ Masukkan email yang valid.";
    return;
  }
  if (!ready) { msgEl.className = "msg msg-error"; msgEl.textContent = "⏳ Menghubungkan..."; return; }

  btn.disabled = true;
  btnText.innerHTML = '<span class="spinner"></span>';
  msgEl.className = "msg";

  try {
    await sendEmailLink(email);
    msgEl.className = "msg msg-success";
    msgEl.innerHTML = `✅ Link login dikirim ke <b>${email}</b>.<br><br>📩 Cek inbox (dan spam). Klik link untuk masuk.`;
    document.getElementById("emailInput").disabled = true;
    btnText.textContent = "📧 Kirim Ulang";
    btn.disabled = false;
  } catch (err) {
    msgEl.className = "msg msg-error";
    msgEl.textContent = "❌ Gagal: " + (err.message || "Coba lagi nanti.");
    btnText.textContent = "📧 Kirim Link Login";
    btn.disabled = false;
  }
};

document.getElementById("emailInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") handleEmailLogin();
});
</script>

</body>
</html>
